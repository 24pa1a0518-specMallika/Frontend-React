<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg p-4">
                    <h2 class="text-center mb-4">Calculator</h2>
                    <form>
                        <div class="mb-3">
                            <label for="num1" class="form-label">Enter num1</label>
                            <input type="number" class="form-control" id="num1" placeholder="enter number">
                        </div>
                        <div class="mb-3">
                            <label for="num2" class="form-label">Enter num2</label>
                            <input type="number" class="form-control" id="num2" placeholder="enter number">
                        </div>
                        <div class="d-flex gap-2 mb-4">
                            <button type="button" class="btn btn-primary" onclick="calculate('ADD')">ADD</button>
                            <button type="button" class="btn btn-primary" onclick="calculate('MUL')">MUL</button>
                            <button type="button" class="btn btn-primary" onclick="calculate('SUB')">SUB</button>
                            <button type="button" class="btn btn-primary" onclick="calculate('DIV')">DIV</button>
                            <button type="reset" class="btn btn-primary">CLEAR</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function calculate(operation) {
            let s1 = Number(document.getElementById("num1").value);
            let s2 = Number(document.getElementById("num2").value);
            let result = 0; 
            switch(operation) {
                case 'ADD':
                    result = s1 + s2;
                    break;
                case 'MUL':
                    result = s1 * s2;
                    break;
                case 'SUB':
                    result = s1 - s2;
                    break;
                case 'DIV':
                    if (s2 === 0) {
                        result = "Cannot divide by zero";
                    } else {
                        result = s1 / s2;
                    }
                    break;
            }

            let newWindow = window.open("", "_blank");
            newWindow.document.write(`
                <h2>Calculation Report</h2>
                <hr>
                <h3>Operation : ${operation}</h3>
                <h3>Result : ${result}</h3>
            `);
            newWindow.document.close();
        } // FIXED: Added missing closing curly bracket for the function
    </script>
</body>
</html>
