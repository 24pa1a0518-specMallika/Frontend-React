<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
             <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg  p-4">
                
            <h2 class="text-center mb-4">Student Grade Calculator</h2>
            <form>
                <div class="mb-3">
                    <label for="studentName" class="form-label">Student Name</label>
                    <input type="text" class="form-control" id="studentName">
                </div>
                <div class="mb-3">
                    <label for="subject1" class="form-label">Subject 1</label>
                    <input type="number" class="form-control" id="subject1">
                </div>
                <div class="mb-3">
                    <label for="subject2" class="form-label">Subject 2</label>
                    <input type="number" class="form-control" id="subject2">
                </div>
                <div class="mb-3">
                    <label for="subject3" class="form-label">Subject 3</label>
                    <input type="number" class="form-control" id="subject3">
                </div>
                <div class="mb-3">
                    <label for="subject4" class="form-label">Subject 4</label>
                    <input type="number" class="form-control" id="subject4">
                </div>
                <div class="mb-4">
                    <label for="subject5" class="form-label">Subject 5</label>
                    <input type="number" class="form-control" id="subject5">
                </div>
                <div class="d-grid">
                        <button type="button" class="btn btn-success btn-lg" onclick="calculateGrade()">Calculate</button>
                    </div>
                <!-- <div class="mt-3">
                        <h5 id="result"></h5>
                </div> -->
                </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>

function calculateGrade(){

    // Get marks
    let s1 = Number(document.getElementById("subject1").value);
    let s2 = Number(document.getElementById("subject2").value);
    let s3 = Number(document.getElementById("subject3").value);
    let s4 = Number(document.getElementById("subject4").value);
    let s5 = Number(document.getElementById("subject5").value);

    // Validate marks
    if(
        s1<1 || s1>100 ||
        s2<1 || s2>100 ||
        s3<1 || s3>100 ||
        s4<1 || s4>100 ||
        s5<1 || s5>100
    ){
        alert("Marks should be in between 1 to 100");
        return;
    }

    // Calculate total
    let total = s1+s2+s3+s4+s5;

    // Calculate average
    let average = total/5;

    // Find Grade
    let grade;

    if(average>=90){
        grade="A";
    }
    else if(average>=80){
        grade="B";
    }
    else if(average>=70){
        grade="C";
    }
    else if(average>=60){
        grade="D";
    }
    else{
        grade="F";
    }
    let newWindow = window.open("", "_blank");

        newWindow.document.write(`
            <h2>Student Grade Report</h2>
            <hr>
            <h3>Total : ${total}</h3>
            <h3>Average : ${average.toFixed(2)}</h3>
            <h3>Grade : ${grade}</h3>
        `);

}

</script>
</body>
</html>
