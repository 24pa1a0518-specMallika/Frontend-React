<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>even or odd</title>
</head>
<body>
    <script>
        const num=prompt("enter number");
        if(num%2==0){
            document.write("even number");
        }else{
            document.write("odd number");
        }
    </script>
</body>
</html>
