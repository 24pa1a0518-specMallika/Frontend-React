<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>examples</title>
</head>
<body>
    <script>
        const num=prompt("enter number");
        if(96%num==0&&num!=0){
            document.write("factor of 96");
        }
        else if(num>96){
            document.write("the input is invalid");
        }else{
            document.write("not factor of 96");
        }
    </script>
</body>
</html>
