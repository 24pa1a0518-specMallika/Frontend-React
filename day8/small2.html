<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>small in 2 numbers</title>
</head>
<body>
    <script>
        const num1=prompt("enter number1");
        const num2=prompt("enter number2");
        if(num1<num2){
            document.write("num1 is small");
        }else{
            document.write("num2 is small");
        }
    </script>
</body>
</html>
