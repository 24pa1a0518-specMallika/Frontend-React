<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 digited number or not</title>
</head>
<body>
    <script>
        const num=prompt("enter number");
        if(num>=100&&num<=999){
            document.write("3 digit  number");
        }else{
            document.write("not a three digit number");
        }
    </script>
</body>
</html>
