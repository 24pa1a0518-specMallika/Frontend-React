<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map</title>
</head>
<body>
    <script>
        const arr=[1,2,3,4,5];
        const num=arr.map((n)=>n*2);
        // for(let i=0;i<arr.length;i++){
        //     console.log(num[i]);
        // }
        document.write(num)
        let str=["john","peter","alex"];
        const n=str.map((s)=>s.toUpperCase());
        document.write(n);
        let nums=[35,60,75,80];
        // function greater(){
            
        // }
        let f=nums.filter(m=>m>=50)
        document.write(f);
    </script>
</body>
</html>
